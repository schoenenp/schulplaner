name: Block Generated Branch PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  block-generated-branch-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Fail deploy branch PRs into main
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "$HEAD_REF" in
            gen-main|panel-main)
              if [ "$BASE_REF" = "main" ]; then
                echo "Deploy branches must not be merged into main."
                echo "Close this PR and update main first, then regenerate app branches."
                exit 1
              fi
              ;;
          esac

          echo "PR branch policy check passed."
